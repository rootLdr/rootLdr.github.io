<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Leandro Lider — Projetos</title>
    <meta name="description" content="Projetos publicados por Leandro Lider." />
    <style>
      :root {
        --bg: #0b1220;
        --surface: #131c2e;
        --border: #243049;
        --text: #e8edf6;
        --muted: #9aa7bd;
        --accent: #3b82f6;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: radial-gradient(1200px 600px at 50% -10%, #16223a 0%, var(--bg) 60%);
        color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem;
        line-height: 1.55;
      }
      .wrap { width: 100%; max-width: 640px; }
      header { margin-bottom: 2.25rem; }
      h1 { font-size: 1.9rem; margin: 0 0 .4rem; letter-spacing: -.02em; }
      .lead { color: var(--muted); margin: 0; font-size: 1.02rem; }
      h2 {
        font-size: .8rem; text-transform: uppercase; letter-spacing: .12em;
        color: var(--muted); font-weight: 600; margin: 0 0 .9rem;
      }
      .card {
        display: flex; align-items: center; justify-content: space-between; gap: 1rem;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 14px; padding: 1.1rem 1.25rem;
        text-decoration: none; color: inherit;
        transition: border-color .18s ease, transform .18s ease;
      }
      .card:hover { border-color: var(--accent); transform: translateY(-2px); }
      .card + .card { margin-top: .75rem; }
      .card__title { font-weight: 600; font-size: 1.08rem; }
      .card__desc { color: var(--muted); font-size: .92rem; margin-top: .15rem; }
      .card__arrow { color: var(--accent); font-size: 1.3rem; flex-shrink: 0; }
      footer { margin-top: 3rem; color: var(--muted); font-size: .82rem; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Leandro Lider</h1>
        <p class="lead">Projetos publicados.</p>
      </header>

      <main>
        <h2>Projetos</h2>

        <a class="card" href="/site-klit/" target="_blank" rel="noopener">
          <span>
            <span class="card__title">Site KLIT</span>
            <span class="card__desc">Site institucional — TI gerenciada e segurança</span>
          </span>
          <span class="card__arrow" aria-hidden="true">&rarr;</span>
        </a>

        <a class="card" href="/site-klit-2/klit-hero-02/" target="_blank" rel="noopener">
          <span>
            <span class="card__title">Site KLIT 2</span>
            <span class="card__desc">Nova versão — hero animado (KLIT Hero 02)</span>
          </span>
          <span class="card__arrow" aria-hidden="true">&rarr;</span>
        </a>
        <!--
          Para adicionar um novo projeto, publique o repositório correspondente
          (ex.: "site2") e duplique o bloco <a class="card"> acima apontando
          para href="/site2/".
        -->
      </main>

      <footer>© <span id="ano"></span> Leandro Lider</footer>
    </div>
    <script>
      document.getElementById("ano").textContent = String(new Date().getFullYear());
    </script>
  </body>
</html>
